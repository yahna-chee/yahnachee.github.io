<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mapa Estelar - Constelación de Cygnus</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: radial-gradient(ellipse at center, #0a0a2a 0%, #000000 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        #info {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            background: rgba(0,0,0,0.6);
            padding: 10px 20px;
            border-radius: 8px;
            z-index: 10;
            pointer-events: none;
        }
        #controls {
            position: absolute;
            bottom: 20px;
            left: 20px;
            color: white;
            background: rgba(0,0,0,0.6);
            padding: 10px;
            border-radius: 8px;
            font-size: 12px;
            z-index: 10;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div id="info">
        <h2>✨ Constelación de Cygnus (El Cisne)</h2>
        <p>Hover sobre las estrellas para ver sus nombres | Relación estelar</p>
    </div>
    <div id="controls">
        🖱️ Haz clic y arrastra para rotar | Scroll para zoom
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

    <script>
        // Escena Three.js para la constelación
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x050510);
        scene.fog = new THREE.FogExp2(0x050510, 0.0005);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(5, 3, 8);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        // Controles de órbita
        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.autoRotate = true;
        controls.autoRotateSpeed = 0.5;
        controls.enableZoom = true;
        controls.enablePan = true;

        // Estrellas de fondo (partículas)
        const starGeometry = new THREE.BufferGeometry();
        const starCount = 1500;
        const starPositions = new Float32Array(starCount * 3);
        for (let i = 0; i < starCount; i++) {
            starPositions[i*3] = (Math.random() - 0.5) * 200;
            starPositions[i*3+1] = (Math.random() - 0.5) * 100;
            starPositions[i*3+2] = (Math.random() - 0.5) * 80 - 40;
        }
        starGeometry.setAttribute('position', new THREE.BufferAttribute(starPositions, 3));
        const starMaterial = new THREE.PointsMaterial({ color: 0xffffff, size: 0.08, transparent: true, opacity: 0.6 });
        const stars = new THREE.Points(starGeometry, starMaterial);
        scene.add(stars);

        // Constelación de Cygnus - posiciones estelares (coordenadas normalizadas)
        const starPos = [
            { name: "Deneb", x: 1.2, y: 2.5, z: 0, color: 0xffaa66, size: 0.25 },      // α Cygni
            { name: "Albireo", x: -1.8, y: -1.2, z: 0.3, color: 0xff9966, size: 0.18 },   // β Cygni
            { name: "Sadr", x: 0, y: 0.5, z: 0, color: 0xffaa88, size: 0.22 },            // γ Cygni
            { name: "Fawaris", x: 1.5, y: -1.8, z: -0.2, color: 0xffaa66, size: 0.16 },   // δ Cygni
            { name: "Aljanah", x: -1.2, y: 2.0, z: 0.1, color: 0xffaa66, size: 0.16 },    // ε Cygni
            { name: "Azelfafage", x: 2.2, y: 0.8, z: -0.3, color: 0x88aaff, size: 0.14 },  // π¹ Cygni
            { name: "Rukh", x: 0.8, y: -2.2, z: 0.2, color: 0x88aaff, size: 0.14 }        // υ Cygni
        ];

        // Conexiones entre estrellas (índices)
        const connections = [
            [0, 2], [2, 1], [2, 3], [0, 4], [4, 2], [2, 5], [3, 6], [1, 6], [0, 5], [4, 1]
        ];

        const spheres = [];
        const labels = [];

        // Crear esferas (estrellas)
        starPos.forEach((star, idx) => {
            const geometry = new THREE.SphereGeometry(star.size, 32, 32);
            const material = new THREE.MeshStandardMaterial({
                color: star.color,
                emissive: star.color,
                emissiveIntensity: 0.3,
                roughness: 0.3,
                metalness: 0.8
            });
            const sphere = new THREE.Mesh(geometry, material);
            sphere.position.set(star.x, star.y, star.z);
            sphere.userData = { name: star.name };
            scene.add(sphere);
            spheres.push(sphere);

            // Crear etiqueta HTML (CSS2DRenderer simplificado - usando texto 3D)
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = 256;
            canvas.height = 64;
            ctx.fillStyle = 'rgba(0,0,0,0.6)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#ffaa66';
            ctx.font = 'Bold 16px "Segoe UI"';
            ctx.fillText(star.name, 10, 30);
            ctx.fillStyle = '#aaffff';
            ctx.font = '12px "Segoe UI"';
            ctx.fillText('⭐ ' + star.name, 10, 55);

            const texture = new THREE.CanvasTexture(canvas);
            const labelMaterial = new THREE.SpriteMaterial({ map: texture, depthTest: false });
            const sprite = new THREE.Sprite(labelMaterial);
            sprite.scale.set(1.2, 0.3, 0.3);
            sprite.position.set(star.x + 0.2, star.y + 0.3, star.z);
            scene.add(sprite);
            labels.push(sprite);
        });

        // Crear líneas de conexión
        const lineMaterial = new THREE.LineBasicMaterial({ color: 0x44aaff, transparent: true, opacity: 0.4 });
        connections.forEach(conn => {
            const points = [];
            points.push(new THREE.Vector3(starPos[conn[0]].x, starPos[conn[0]].y, starPos[conn[0]].z));
            points.push(new THREE.Vector3(starPos[conn[1]].x, starPos[conn[1]].y, starPos[conn[1]].z));
            const geometry = new THREE.BufferGeometry().setFromPoints(points);
            const line = new THREE.Line(geometry, lineMaterial);
            scene.add(line);
        });

        // Añadir un halo de nebulosa (efecto visual)
        const nebulaGeometry = new THREE.SphereGeometry(3.5, 32, 32);
        const nebulaMaterial = new THREE.MeshPhongMaterial({
            color: 0x2244aa,
            emissive: 0x112244,
            transparent: true,
            opacity: 0.08,
            side: THREE.BackSide
        });
        const nebula = new THREE.Mesh(nebulaGeometry, nebulaMaterial);
        scene.add(nebula);

        // Iluminación
        const ambientLight = new THREE.AmbientLight(0x222222);
        scene.add(ambientLight);
        const pointLight = new THREE.PointLight(0xffaa66, 1, 30);
        pointLight.position.set(2, 3, 4);
        scene.add(pointLight);
        const backLight = new THREE.PointLight(0x4488ff, 0.5);
        backLight.position.set(-2, -1, -3);
        scene.add(backLight);

        // Animación
        let time = 0;
        function animate() {
            requestAnimationFrame(animate);
            time += 0.005;
            controls.update(); // actualiza automáticamente si autoRotate está activo

            // Efecto de brillo pulsante en las estrellas
            spheres.forEach((sphere, idx) => {
                const intensity = 0.3 + Math.sin(time * 2 + idx) * 0.15;
                sphere.material.emissiveIntensity = intensity;
            });

            // Rotación muy lenta del fondo estelar
            stars.rotation.y += 0.0005;
            stars.rotation.x += 0.0003;

            renderer.render(scene, camera);
        }
        animate();

        // Resize handler
        window.addEventListener('resize', onWindowResize, false);
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }
    </script>
</body>
</html>
